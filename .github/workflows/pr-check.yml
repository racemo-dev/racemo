name: PR Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config libssl-dev libgtk-3-dev

      - name: Clear stale sccache wrapper
        run: unset RUSTC_WRAPPER 2>/dev/null; echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Cache Rust
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: src-tauri
          prefix-key: v1

      - name: Frontend Lint
        run: npm run lint

      - name: Rust Tests
        run: cd src-tauri && cargo test

      - name: Rust Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Frontend Build
        run: npm run build
