version: 2
updates:
  # GitHub Actions — 보안 업데이트만
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    ignore:
      - dependency-name: "*"

  # npm — 보안 업데이트만
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      - dependency-name: "*"

  # Cargo (src-tauri) — 보안 업데이트만
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "rust"
    ignore:
      - dependency-name: "*"

  # Cargo (signaling-server) — 보안 업데이트만
  - package-ecosystem: "cargo"
    directory: "/signaling-server"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "rust"
    ignore:
      - dependency-name: "*"
